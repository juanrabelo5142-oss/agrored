<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Perfil | AgroRed</title>
    <link rel="icon" href="{{ url_for('static', filename='img/logo.png') }}">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --verde-agro: #06bc67;
            --verde-suave: #e8f7ee;
            --amarillo-agro: #f9d71c;
            --rojo-alerta: #ff4d4d;
            --negro: #1a1a1a;
            --blanco: #ffffff;
            --gris-texto: #555555;
            --fondo: #f4f7f6;
            --radio: 20px;
            --sombra: 0 10px 30px rgba(0,0,0,0.05);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Public Sans', sans-serif; background: var(--fondo); color: var(--negro); }
        
        /* Layout Principal */
        .main-wrapper { display: flex; min-height: 100vh; }

        /* Sidebar Lateral */
        .sidebar {
            width: 280px; background: var(--negro); color: white;
            padding: 40px 20px; display: flex; flex-direction: column;
            position: fixed; height: 100vh;
        }
        .sidebar h2 { font-weight: 800; font-size: 24px; margin-bottom: 40px; text-align: center; }
        .sidebar h2 span { color: var(--verde-agro); }
        
        .menu-item {
            color: rgba(255,255,255,0.7); text-decoration: none; padding: 14px 20px;
            font-weight: 700; font-size: 14px;
            display: flex; align-items: center; gap: 15px; transition: 0.3s;
            border-radius: 12px; margin-bottom: 8px;
        }
        .menu-item:hover {
            background: rgba(255,255,255,0.1); color: white;
        }
        .menu-item.active {
            background: var(--verde-agro); color: white;
        }

        /* Botón Volver a la Tienda */
        .btn-sidebar-tienda {
            background: var(--amarillo-agro);
            color: var(--negro) !important;
            margin-bottom: 30px;
            justify-content: center;
        }
        .btn-sidebar-tienda:hover { transform: translateY(-2px); filter: brightness(1.1); }

        /* Estilo especial para Cerrar Sesión */
        .logout-item {
            color: var(--rojo-alerta) !important;
        }
        .logout-item:hover {
            background: rgba(255, 77, 77, 0.1) !important;
            color: #ff1a1a !important;
        }

        /* Contenido Derecha */
        .content { flex: 1; padding: 40px 5%; margin-left: 280px; }

        .header-cliente { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; }
        .header-cliente h1 { font-size: 32px; font-weight: 800; }
        .header-cliente p { font-weight: 700; color: var(--verde-agro); font-size: 14px; }

        .user-avatar {
            width: 70px; height: 70px; background: var(--amarillo-agro);
            border-radius: 20px; display: flex; align-items: center; justify-content: center;
            font-size: 40px; color: var(--negro); box-shadow: 0 5px 15px rgba(249, 215, 28, 0.3);
        }

        /* Tarjetas */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 25px; margin-bottom: 40px; }
        
        .stat-card {
            background: white; padding: 25px; border-radius: var(--radio); box-shadow: var(--sombra);
        }
        .stat-card h3 { font-size: 12px; text-transform: uppercase; color: var(--gris-texto); font-weight: 800; margin-bottom: 10px; }
        .stat-card p { font-size: 28px; font-weight: 800; color: var(--negro); }

        /* Formulario de Configuración */
        .profile-card {
            background: white; border-radius: var(--radio); padding: 40px; box-shadow: var(--sombra); margin-bottom: 40px;
        }
        .profile-card h2 { font-size: 20px; font-weight: 800; margin-bottom: 30px; color: var(--negro); }

        .form-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; }

        .input-group label {
            display: block; font-weight: 700; font-size: 13px; margin-bottom: 8px; color: var(--gris-texto);
        }
        .input-group input {
            width: 100%; padding: 14px; border: 1px solid #eee; border-radius: 12px;
            font-family: 'Public Sans'; font-weight: 600; background: #fafafa; transition: 0.3s;
        }
        .input-group input:focus {
            outline: none; border-color: var(--verde-agro); background: white; box-shadow: 0 0 0 4px var(--verde-suave);
        }
        .input-group input[readonly] { background: #f0f0f0; color: #999; cursor: not-allowed; }

        .btn-update {
            background: var(--verde-agro); color: white; border: none; padding: 18px 40px;
            border-radius: 15px; font-weight: 800; font-size: 15px; cursor: pointer;
            transition: 0.3s; box-shadow: 0 8px 20px rgba(6, 188, 103, 0.2);
            margin-top: 30px;
        }
        .btn-update:hover { background: var(--negro); transform: translateY(-2px); }

        @media (max-width: 1024px) {
            .sidebar { width: 80px; padding: 20px 10px; }
            .sidebar h2, .menu-item span:not(.material-icons-round) { display: none; }
            .content { margin-left: 80px; }
            .form-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div class="main-wrapper">
        <nav class="sidebar">
            <h2>AGRO<span>RED</span></h2>
            
            <a href="{{ url_for('index') }}" class="menu-item btn-sidebar-tienda">
                <span class="material-icons-round">shopping_basket</span> <span>Volver a la Tienda</span>
            </a>

            <a href="{{ url_for('paginacliente') }}" class="menu-item active">
                <span class="material-icons-round">person</span> <span>Mi Perfil</span>
            </a>
            
            <a href="{{ url_for('mis_pedidos') }}" class="menu-item">
                <span class="material-icons-round">shopping_bag</span> <span>Mis Pedidos</span>
            </a>
            
            <a href="{{ url_for('ver_favoritos', origin='perfil') }}" class="menu-item">
                <span class="material-icons-round">favorite</span> <span>Favoritos</span>
            </a>
            
            <div style="margin-top: auto;">
                <a href="{{ url_for('logout') }}" class="menu-item logout-item">
                    <span class="material-icons-round">logout</span> <span>Cerrar Sesión</span>
                </a>
            </div>
        </nav>

        <main class="content">
            <header class="header-cliente">
                <div>
                    <p>BIENVENIDO DE VUELTA</p>
                    <h1>Hola, {{ nombre }}</h1>
                </div>
                <div class="user-avatar">
                    <span class="material-icons-round">account_circle</span>
                </div>
            </header>

            <section class="stats-grid">
                <div class="stat-card">
                    <h3>Pedidos Realizados</h3>
                    <p>0</p>
                </div>
                <div class="stat-card">
                    <h3>Puntos AgroRed</h3>
                    <p>150</p>
                </div>
                <div class="stat-card">
                    <h3>Favoritos</h3>
                    <p>0</p>
                </div>
            </section>

            <section class="profile-card">
                <h2>Configuración de tu cuenta</h2>
                
                <form action="{{ url_for('actualizar_datos_cliente') }}" method="POST">
                    <div class="form-grid">
                        <div class="input-group">
                            <label>Tipo de Identificación</label>
                            <input type="text" value="{{ usuario.tipo_documento }}" readonly>
                        </div>

                        <div class="input-group">
                            <label>Número de Documento</label>
                            <input type="text" value="{{ usuario.numero_documento }}" readonly>
                        </div>

                        <div class="input-group">
                            <label>Nombre Completo</label>
                            <input type="text" name="nombre" value="{{ usuario.nombre }}" required>
                        </div>

                        <div class="input-group">
                            <label>Correo Electrónico</label>
                            <input type="email" name="email" value="{{ usuario.email }}" required>
                        </div>

                        <div class="input-group">
                            <label>Teléfono Celular</label>
                            <input type="text" name="telefono" value="{{ usuario.telefono }}">
                        </div>

                        <div class="input-group">
                            <label>Dirección Residencia</label>
                            <input type="text" name="direccion" value="{{ usuario.direccion }}">
                        </div>

                        <div class="input-group">
                            <label>Departamento</label>
                            <input type="text" name="departamento" value="{{ usuario.departamento }}">
                        </div>

                        <div class="input-group">
                            <label>Municipio / Ciudad</label>
                            <input type="text" name="municipio" value="{{ usuario.municipio }}">
                        </div>
                    </div>

                    <div style="text-align: right;">
                        <button type="submit" class="btn-update">
                            Guardar Cambios
                        </button>
                    </div>
                </form>
            </section>
        </main>
    </div>

</body>
</html>
